<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <meta name="description" content="Cambio de batería para iPhone con repuestos Ampsentrix premium. Baterías Ampsentrix de alta capacidad en Santiago. Instalación express y garantía de 6 meses." />
    <meta name="keywords" content="batería Ampsentrix, cambio de batería iPhone, Ampsentrix Chile, baterías de alta capacidad iPhone, servicio técnico iPhone" />
    <title>FixBattery | Cambio de Baterías Ampsentrix para iPhone</title>

    <!-- Open Graph / Twitter Card: valores por defecto para todo el sitio.
         Las páginas de producto y blog los sobrescriben en tiempo de ejecución
         mediante el hook useDocumentHead (ver src/lib/useDocumentHead.ts). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FixBattery" />
    <meta property="og:title" content="FixBattery | Cambio de Baterías Ampsentrix para iPhone" />
    <meta property="og:description" content="Cambio de batería para iPhone con repuestos Ampsentrix premium en Santiago. Instalación express y garantía de 6 meses." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="es_CL" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FixBattery | Cambio de Baterías Ampsentrix para iPhone" />
    <meta name="twitter:description" content="Cambio de batería para iPhone con repuestos Ampsentrix premium en Santiago. Instalación express y garantía de 6 meses." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Datos estructurados del negocio (Schema.org) para resultados enriquecidos en buscadores -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ElectronicsStore",
        "name": "FixBattery",
        "image": "/og-image.jpg",
        "url": "https://fixbattery.cl",
        "telephone": "+56957098231",
        "description": "Servicio técnico especializado en cambio de baterías y pantallas para iPhone con repuestos AmpSentrix Premium.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Arturo Prat 60, of. 3, Edificio Casa Fácil",
          "addressLocality": "Santiago",
          "addressCountry": "CL"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "10:00",
            "closes": "19:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Saturday"],
            "opens": "10:00",
            "closes": "14:00"
          }
        ]
      }
    </script>

    <!-- Aplica el tema guardado antes de la primera pintura para evitar el
         parpadeo de modo claro/oscuro (FOUC) mientras carga React. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fixbattery-ui-theme');
          var theme = stored === 'dark' || stored === 'light' ? stored : 'light';
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
